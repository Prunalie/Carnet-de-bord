<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de Recettes 🍽️</title>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4A7C59;--green-light:#EAF2EC;--green-dark:#2E5438;
  --amber:#E8B86D;--amber-light:#FDF6E9;
  --bg:#F9F6F0;--card:#fff;--text:#2C3E2D;--text-muted:#7A917D;
  --border:#DDE8DF;--shadow:0 2px 8px rgba(0,0,0,.08);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* HEADER */
#header{background:var(--green-dark);color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:150}
#header h1{font-size:1rem;font-weight:700;white-space:nowrap}
#header h1 span{font-size:1.2rem}
#sync-btn{background:var(--amber);color:var(--green-dark);border:none;border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap}
#sync-btn:hover{background:#d4a55a}
/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--green-dark);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 10px rgba(0,0,0,.2)}
#bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px 8px;background:none;border:none;border-top:2px solid transparent;color:rgba(255,255,255,.5);font-size:.55rem;cursor:pointer;gap:2px;min-height:56px;transition:.15s}
#bottom-nav button .ni{font-size:1.35rem;line-height:1}
#bottom-nav button.active{color:var(--amber);border-top-color:var(--amber)}
/* MAIN */
#main{max-width:1100px;margin:0 auto;padding:16px 16px 80px}
/* HOME */
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.home-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 12px;cursor:pointer;border:2px solid transparent;transition:.2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
.home-card:active{border-color:var(--green);background:var(--green-light)}
.home-card .hc-icon{font-size:2rem}
.home-card .hc-label{font-weight:700;color:var(--green-dark);font-size:.9rem}
.home-card .hc-stat{font-size:.75rem;color:var(--text-muted)}
/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
/* RECIPE CARD */
.recipe-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;cursor:pointer;border:2px solid transparent;transition:.2s;position:relative}
.recipe-card:hover{border-color:var(--green);transform:translateY(-2px)}
.recipe-card .rc-name{font-weight:700;font-size:1rem;margin-bottom:6px;color:var(--green-dark)}
.recipe-card .rc-meta{font-size:.78rem;color:var(--text-muted);margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{background:var(--green-light);color:var(--green-dark);border-radius:20px;padding:2px 9px;font-size:.72rem;font-weight:600}
.tag.amber{background:var(--amber-light);color:#8a6520}
.tag.season{background:#EEF2FF;color:#4338CA}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:.15s}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-dark)}
.btn-outline{background:#fff;color:var(--green);border:1.5px solid var(--green)}.btn-outline:hover{background:var(--green-light)}
.btn-danger{background:#FEE2E2;color:#B91C1C;border:1.5px solid #FECACA}.btn-danger:hover{background:#FECACA}
.btn-sm{padding:5px 11px;font-size:.8rem}
/* FORMS */
.form-group{margin-bottom:14px}
label{display:block;font-size:.83rem;font-weight:600;color:var(--text-muted);margin-bottom:4px}
input[type=text],input[type=number],textarea,select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;outline:none;transition:.15s;background:#fff}
input[type=text]:focus,input[type=number]:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:80px}
.check-grid{display:flex;flex-wrap:wrap;gap:8px}
.check-label{display:flex;align-items:center;gap:5px;font-size:.83rem;cursor:pointer;background:var(--green-light);padding:4px 10px;border-radius:20px;border:1.5px solid transparent;transition:.15s}
.check-label:has(input:checked){background:var(--green);color:#fff;border-color:var(--green)}
.check-label input{display:none}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.modal h2{font-size:1.2rem;margin-bottom:20px;color:var(--green-dark)}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-muted)}
/* PLANNER — day-cards */
.planner-days{display:grid;grid-template-columns:1fr;gap:10px}
.day-card{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);overflow:hidden}
.day-card-header{background:var(--green);color:#fff;padding:8px 12px;font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:space-between}
.day-card-header.today{background:var(--amber);color:var(--green-dark)}
.day-meal-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border)}
.day-meal-row:last-child{border-bottom:none}
.day-meal-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
.day-slot{flex:1;background:none;border:1.5px dashed var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.8rem;color:var(--text-muted);text-align:left;transition:.15s;min-height:34px;display:flex;align-items:center;justify-content:space-between}
.day-slot:hover{border-color:var(--green);background:var(--green-light)}
.day-slot.filled{border-style:solid;border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.day-slot .slot-x{color:var(--text-muted);font-size:.8rem;flex-shrink:0;padding-left:6px}
.day-slot .slot-x:hover{color:#B91C1C}
/* SIDEBAR (desktop) */
#sidebar{display:none;position:fixed;left:0;top:0;bottom:0;width:200px;background:var(--green-dark);flex-direction:column;z-index:200;box-shadow:2px 0 8px rgba(0,0,0,.15)}
.sidebar-logo{color:#fff;font-weight:700;font-size:1rem;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12);white-space:nowrap}
.sidebar-logo span{font-size:1.2rem}
#sidebar-nav button{display:flex;align-items:center;gap:10px;padding:12px 16px;background:none;border:none;border-left:3px solid transparent;color:rgba(255,255,255,.6);font-size:.88rem;cursor:pointer;width:100%;text-align:left;transition:.15s}
#sidebar-nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
#sidebar-nav button.active{color:var(--amber);border-left-color:var(--amber);background:rgba(255,255,255,.06)}
#sidebar-nav button .ni{font-size:1.1rem;width:22px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.12)}
.sidebar-footer button{background:var(--amber);color:var(--green-dark);border:none;border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;font-size:.83rem;font-weight:600;width:100%}
/* RESPONSIVE */
@media(min-width:768px){
  #bottom-nav{display:none}
  #header{display:none}
  #sidebar{display:flex}
  #main{margin-left:200px;max-width:none;padding:24px;padding-bottom:24px}
  .home-grid{grid-template-columns:repeat(3,1fr)}
  .planner-days{grid-template-columns:repeat(7,1fr)}
}
@media(max-width:767px){
  .planner-days{grid-template-columns:1fr}
}
/* SHOPPING */
.shop-section{margin-bottom:20px}
.shop-section h3{font-weight:700;color:var(--green-dark);margin-bottom:10px;padding-bottom:4px;border-bottom:2px solid var(--green-light)}
.shop-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--green-light)}
.ing-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;margin-bottom:7px;background:var(--card);border:1.5px solid var(--border);transition:.15s}
.ing-item .ing-name{flex:1;font-size:.95rem;cursor:pointer;user-select:none}
.seg-tabs{display:flex;background:var(--green-light);border-radius:10px;padding:4px;margin-bottom:14px;gap:4px}
.seg-tab{flex:1;padding:9px 6px;border:none;border-radius:7px;font-weight:700;font-size:.85rem;cursor:pointer;transition:.15s;background:none;color:var(--green-dark)}
.seg-tab.active{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.14)}
.shop-item label{cursor:pointer;font-size:.9rem;flex:1}
.shop-item input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer}
.shop-item.checked label{text-decoration:line-through;color:var(--text-muted)}
/* PROFILES */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.profile-grid{grid-template-columns:1fr}}
.prefs-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pref-chip{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem}
.pref-chip.like{background:#DCFCE7;color:#166534}
.pref-chip.dislike{background:#FEE2E2;color:#991B1B}
.pref-chip button{background:none;border:none;cursor:pointer;font-size:.75rem;color:inherit;line-height:1}
/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;transition:.15s}
.filter-btn:hover,.filter-btn.on{background:var(--green);color:#fff;border-color:var(--green)}
.search-box{padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:.85rem;outline:none;min-width:200px}
.search-box:focus{border-color:var(--green)}
/* MISC */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:1.3rem;color:var(--green-dark)}
.empty-state{text-align:center;padding:40px;color:var(--text-muted)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.flex-gap{display:flex;gap:8px;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.two-col{grid-template-columns:1fr}}
.ing-row{display:grid;grid-template-columns:1fr 80px 80px 28px;gap:6px;margin-bottom:6px;align-items:center}
.step-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.step-num{background:var(--green);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:8px}
.del-btn{background:#FEE2E2;color:#B91C1C;border:none;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.week-nav button{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:.85rem;font-weight:600}
.week-nav button:hover{background:var(--green-light)}
.week-label{font-weight:700;color:var(--green-dark);font-size:.95rem}
.recipe-picker{display:grid;grid-template-columns:1fr;gap:8px;max-height:50vh;overflow-y:auto;padding-right:4px}
.picker-item{display:flex;align-items:center;gap:10px;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:.15s}
.picker-item:hover{border-color:var(--green);background:var(--green-light)}
.picker-item .pi-name{font-weight:600;font-size:.88rem}
.picker-item .pi-meta{font-size:.75rem;color:var(--text-muted)}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-logo"><span>🍽️</span> Carnet de Bord</div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer"><button onclick="toggleSync()">💾 Données</button></div>
</div>
<div id="header">
  <h1><span>🍽️</span> Carnet de Bord</h1>
  <button id="sync-btn" onclick="toggleSync()">💾 Données</button>
</div>
<div id="main"></div>
<nav id="bottom-nav"></nav>

<!-- Modals -->
<div class="overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div class="overlay" id="picker-overlay"><div class="modal" id="picker-content" style="max-width:500px"></div></div>
<!-- Import caché (fonctionne sur Android) -->
<input type="file" id="file-import-input" accept=".json" style="display:none" onchange="importFromInput(this)">

let state = {};

function ensureStateFields() {
  if (!state.recipes || !state.recipes.length) state.recipes = JSON.parse(JSON.stringify(INITIAL_DATA.recipes));
  if (!state.profiles) state.profiles = JSON.parse(JSON.stringify(INITIAL_DATA.profiles));
  if (!state.weeklyPlans) state.weeklyPlans = [];
  if (!state.checkedItems) state.checkedItems = {};
  if (!state.maisonItems) state.maisonItems = JSON.parse(JSON.stringify(INITIAL_DATA.maisonItems));
  // Migration vers masterIngredients (liste unifiée)
  if (!state.masterIngredients) {
    const seen = new Set();
    state.masterIngredients = [];
    const pantry = state.pantryItems || INITIAL_DATA.pantryItems || [];
    const manual = state.ingredientItems || INITIAL_DATA.ingredientItems || [];
    pantry.forEach(p => {
      const key = p.name.toLowerCase().trim();
      if (!seen.has(key)) { seen.add(key); state.masterIngredients.push({id:p.id,name:p.name,type:'pantry',needToBuy:p.needToBuy||false}); }
    });
    manual.forEach(i => {
      const key = i.name.toLowerCase().trim();
      if (!seen.has(key)) { seen.add(key); state.masterIngredients.push({id:i.id,name:i.name,type:'shopping',cat:i.cat,needToBuy:i.needToBuy||false}); }
    });
  }
  // Migration des rayons vers state (personnalisables)
  if (!state.ingredientCats) state.ingredientCats = JSON.parse(JSON.stringify(INITIAL_ingCats()));
  // S'assurer que chaque ingrédient a un rayon
  state.masterIngredients.forEach(i => { if (!i.cat) i.cat = 'autre'; });
  if (!state.dismissedItems) state.dismissedItems = {};
  if (!state.shoppingHistory) state.shoppingHistory = [];
}

function normIngName(n) { return (n||'').toLowerCase().trim().replace(/s$/,''); }
function sumQty(entries) {
  const byUnit = {};
  entries.forEach(({q,u}) => {
    const unit = (u||'').trim();
    const num = parseFloat((q||'').toString().replace(',','.'));
    if (!byUnit[unit]) byUnit[unit] = {sum:0, raw:q};
    if (!isNaN(num)) byUnit[unit].sum += num; else byUnit[unit].sum = null;
  });
  return Object.entries(byUnit).map(([unit, {sum, raw}]) => {
    if (sum === null) return unit ? `${raw} ${unit}` : raw;
    const s = sum % 1 === 0 ? sum : parseFloat(sum.toFixed(1));
    return unit ? `${s} ${unit}` : `${s}`;
  }).join(' + ');
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('carnet-recettes');
    if (saved) { state = JSON.parse(saved); }
    else { state = JSON.parse(JSON.stringify(INITIAL_DATA)); }
  } catch { state = JSON.parse(JSON.stringify(INITIAL_DATA)); }
}

async function initFirestore() {
  try {
    const doc = await DOC_REF.get();
    if (doc.exists) {
      state = doc.data();
      ensureStateFields();
    } else {
      await DOC_REF.set(state);
    }
    localStorage.setItem('carnet-recettes', JSON.stringify(state));
    render();
    setupRealtime();
  } catch (e) {
    console.warn('Firebase non disponible, mode hors ligne:', e);
  }
}

function setupRealtime() {
  DOC_REF.onSnapshot(doc => {
    if (!doc.exists || doc.metadata.hasPendingWrites) return;
    const dataStr = JSON.stringify(doc.data());
    if (dataStr === _lastFirestoreData) return;
    _lastFirestoreData = dataStr;
    if (JSON.stringify(state) !== dataStr) {
      state = doc.data();
      ensureStateFields();
      localStorage.setItem('carnet-recettes', JSON.stringify(state));
      render();
    }
  });
}

async function save() {
  localStorage.setItem('carnet-recettes', JSON.stringify(state));
  try {
    _lastFirestoreData = JSON.stringify(state);
    await DOC_REF.set(state);
  } catch (e) {
    console.warn('Erreur sauvegarde Firebase:', e);
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'carnet-recettes.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function importFromInput(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const loaded = JSON.parse(e.target.result);
      if (!loaded.recipes) throw new Error('Fichier non reconnu (pas de recettes).');
      state = loaded;
      if (!state.profiles) state.profiles = JSON.parse(JSON.stringify(INITIAL_DATA.profiles));
      if (!state.weeklyPlans) state.weeklyPlans = [];
      if (!state.checkedItems) state.checkedItems = {};
      save();
      alert('✅ Données importées avec succès !');
      render();
    } catch(err) {
      alert('Erreur lors de l\'import : ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function toggleSync() {
  const menu = document.getElementById('sync-menu');
  if (menu) { menu.remove(); return; }
  const btn = document.getElementById('sync-btn');
  const div = document.createElement('div');
  div.id = 'sync-menu';

  div.innerHTML = `

    <button onclick="document.getElementById('file-import-input').click();document.getElementById('sync-menu')?.remove()" style="${btnStyle}" onmouseover="this.style.background='#EAF2EC'" onmouseout="this.style.background='none'">📥 Restaurer une sauvegarde</button>
    <div style="border-top:1px solid #DDE8DF;margin:4px 0"></div>
    <button onclick="if(confirm('⚠️ Remettre toutes les données par défaut ? Vos recettes ajoutées et votre planning seront perdus.')){state=JSON.parse(JSON.stringify(INITIAL_DATA));save();render();}document.getElementById('sync-menu')?.remove()" style="${btnStyle};color:#B91C1C" onmouseover="this.style.background='#FEE2E2'" onmouseout="this.style.background='none'">🗑️ Réinitialiser les données</button>
  `;
  document.body.appendChild(div);
  setTimeout(() => document.addEventListener('click', function h(e){if(!div.contains(e.target)&&e.target!==btn){div.remove();document.removeEventListener('click',h)}},0));

  let visible = 0;
  cards.forEach(card => {
    const name = card.dataset.name || '';
    const mealtype = card.dataset.mealtype || '';
    const season = card.dataset.season || '';
    const tags = card.dataset.tags || '';
    const show = (!f.mealType || mealtype.split(',').includes(f.mealType))
      && (!f.season || season.split(',').some(s=>s===f.season||s==='toutes'))
      && (!f.tag || tags.split(',').includes(f.tag))
      && (!search || name.includes(search));
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const count = document.getElementById('recipe-count');
  if (count) count.textContent = `(${visible}/${state.recipes.length})`;
}
function toggleFilter(key, val) { activeFilters[key] = activeFilters[key]===val?null:val; renderMain(); }
function clearFilters() { activeFilters={mealType:null,season:null,tag:null,search:''}; renderMain(); }
function renderMain() {
  const m = document.getElementById('main');
  if (activeTab==='home') m.innerHTML=renderHome();
  else if (activeTab==='recipes') m.innerHTML=renderRecipes();
  else if (activeTab==='profiles') m.innerHTML=renderProfiles();
  else if (activeTab==='planner') m.innerHTML=renderPlanner();
  else if (activeTab==='ingredients') m.innerHTML=renderIngredients();
  else if (activeTab==='maison') m.innerHTML=renderMaison();
  else m.innerHTML=renderShopping();
}

function deleteRecipe(id) {

}

function addIng() {
  window.formIng.push({n:'',q:'',u:''});
  const i = window.formIng.length-1;
  const div = document.createElement('div'); div.id=`ing-${i}`; div.className='ing-row';
  div.innerHTML=`<input type="text" placeholder="Ingrédient" list="mi-recipe-dl" autocomplete="off" oninput="formIng[${i}].n=this.value"><input type="text" placeholder="Qté" oninput="formIng[${i}].q=this.value"><input type="text" placeholder="Unité" oninput="formIng[${i}].u=this.value"><button class="del-btn" onclick="removeIng(${i})">−</button>`;
  document.getElementById('ing-list').appendChild(div);
}
function removeIng(i) { window.formIng[i]=null; document.getElementById(`ing-${i}`)?.remove(); }
function addStep() {
  window.formSteps.push('');
  const i = window.formSteps.length-1;
  const div = document.createElement('div'); div.id=`step-${i}`; div.className='step-row';
  div.innerHTML=`<div class="step-num">${i+1}</div><textarea oninput="formSteps[${i}]=this.value" style="min-height:56px"></textarea><button class="del-btn" onclick="removeStep(${i})" style="margin-top:8px">−</button>`;
  document.getElementById('step-list').appendChild(div);
}
function removeStep(i) { window.formSteps[i]=null; document.getElementById(`step-${i}`)?.remove(); }
function saveRecipeForm(existingId) {
  const name = document.getElementById('rf-name').value.trim();
  if (!name) { alert('Le nom de la recette est requis.'); return; }
  const mealType = [...document.querySelectorAll('input[name=mealType]:checked')].map(x=>x.value);
  const season = [...document.querySelectorAll('input[name=season]:checked')].map(x=>x.value);
  const tags = [...document.querySelectorAll('input[name=tags]:checked')].map(x=>x.value);
  if (!mealType.length) { alert('Sélectionnez au moins un type de repas.'); return; }
  const recipe = {
    id: existingId || uid(), name,
    mealType, season: season.length?season:['toutes'], tags,
    prepTime: parseInt(document.getElementById('rf-preptime').value)||0,
    cookTime: parseInt(document.getElementById('rf-cooktime').value)||0,
    servings: parseInt(document.getElementById('rf-servings').value)||4,
    ingredients: window.formIng.filter(x=>x&&x.n.trim()),
    steps: window.formSteps.filter(x=>x!=null&&x.trim()),
    notes: document.getElementById('rf-notes').value.trim()
  };
  if (existingId) { const idx=state.recipes.findIndex(r=>r.id===existingId); state.recipes[idx]=recipe; }
  else { state.recipes.push(recipe); }
  save(); closeModal(); renderMain();
}

function renderPlanner() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const weekKey = ws.toISOString().slice(0,10);
  const plan = getOrCreatePlan(weekKey);
  const today = new Date(); today.setHours(0,0,0,0);
  const mealIcons = {matin:'🌅',midi:'☀️',soir:'🌙'};
  const days = DAYS_K.map((dk, i) => {
    const dt = new Date(ws); dt.setDate(dt.getDate()+i);
    const isToday = dt.toDateString()===today.toDateString();
    const label = DAYS[i] + ' ' + dt.getDate();
    const meals = MEALS.map(m => {
      const rid = plan.days[dk]?.[m.k];
      const r = rid ? recipeById(rid) : null;
      return `<div class="day-meal-row">
        <span class="day-meal-icon">${mealIcons[m.k]}</span>
        <button class="day-slot${r?' filled':''}" onclick="openRecipePicker('${weekKey}','${dk}','${m.k}')">
          <span>${r ? escHtml(r.name) : '+'}</span>
          ${r ? `<span class="slot-x" onclick="event.stopPropagation();clearSlot('${weekKey}','${dk}','${m.k}')">✕</span>` : ''}
        </button>
      </div>`;
    }).join('');
    return `<div class="day-card">
      <div class="day-card-header${isToday?' today':''}">
        ${isToday?'📍 ':''}${label}
      </div>
      ${meals}
    </div>`;
  }).join('');
  return `
  <div class="section-header"><h2>📅 Planning</h2>
    <button class="btn btn-outline btn-sm" onclick="clearWeek('${weekKey}')">🗑 Semaine</button>
  </div>
  <div class="week-nav">
    <button onclick="weekOffset--;render()" style="font-size:1.2rem;padding:6px 16px">◀</button>
    <span class="week-label" style="flex:1;text-align:center">${fmtDate(ws)} — ${fmtDate(we)}</span>
    <button onclick="weekOffset++;render()" style="font-size:1.2rem;padding:6px 16px">▶</button>
    <button class="btn btn-outline btn-sm" onclick="weekOffset=0;render()">Auj.</button>
  </div>
  <div class="planner-days">${days}</div>`;
}
function clearWeek(weekKey) {
  if (!confirm('Effacer tout le planning de cette semaine ?')) return;
  const plan = state.weeklyPlans.find(p=>p.weekStart===weekKey);
  if (plan) plan.days = {};
  save(); render();
}
function clearSlot(weekKey, day, meal) {
  const plan = state.weeklyPlans.find(p=>p.weekStart===weekKey);
  if (plan?.days[day]) delete plan.days[day][meal];
  save(); render();
}

let _pickerTarget = null;
function openRecipePicker(weekKey, day, meal) {
  _pickerTarget = {weekKey, day, meal};
  const allRecipes = [...state.recipes].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  const pc = document.getElementById('picker-content');
  pc.innerHTML = `
    <button class="modal-close" onclick="closePicker()">×</button>
    <h2>Choisir une recette · ${DAYS.find((_,i)=>DAYS_K[i]===day)||day} ${meal}</h2>
    <input class="search-box" style="width:100%;margin-bottom:12px" type="text" placeholder="🔍 Rechercher…" oninput="filterPicker(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off">
    <div class="recipe-picker" id="recipe-picker-list">
      ${allRecipes.map(r=>`<div class="picker-item" data-name="${escHtml(r.name.toLowerCase())}" onclick="selectRecipe('${r.id}')">
        <div><div class="pi-name">${escHtml(r.name)}</div><div class="pi-meta">⏱ ${r.prepTime+r.cookTime} min · ${r.servings} pers. · ${r.tags.slice(0,3).join(', ')}</div></div>

function filterPicker(q) {

    el.style.display = el.dataset.name.includes(q.toLowerCase()) ? '' : 'none';
  });

function selectRecipe(recipeId) {
  const {weekKey,day,meal} = _pickerTarget;
  const plan = getOrCreatePlan(weekKey);
  if (!plan.days[day]) plan.days[day] = {};
  plan.days[day][meal] = recipeId;
  save(); closePicker(); render();
}
function closePicker() { document.getElementById('picker-overlay').classList.remove('open'); }

let _planWeekOffset = 0;
let _planRecipeId = null;

function openPlanFromRecipe(recipeId) {
  _planRecipeId = recipeId;
  _planWeekOffset = weekOffset;
  const r = recipeById(recipeId); if (!r) return;
  const h = new Date().getHours();
  const defaultMeal = h < 11 ? 'matin' : h < 15 ? 'midi' : 'soir';
  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>📅 Planifier</h2>
    <p style="font-weight:700;color:var(--green-dark);margin-bottom:14px">${escHtml(r.name)}</p>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">
      <button class="btn btn-outline btn-sm" onclick="shiftPlanWeek(-1)">◀</button>
      <span id="plan-week-label" style="flex:1;text-align:center;font-size:.82rem;color:var(--text-muted)"></span>
      <button class="btn btn-outline btn-sm" onclick="shiftPlanWeek(1)">▶</button>
    </div>
    <div class="form-group"><label>Jour</label>
      <select id="plan-day"></select>
    </div>
    <div class="form-group"><label>Repas</label>
      <select id="plan-meal">
        ${MEALS.map(m=>`<option value="${m.k}" ${m.k===defaultMeal?'selected':''}>${m.label}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button id="plan-confirm-btn" class="btn btn-primary">✔ Ajouter</button>
    </div>`;
  document.getElementById('plan-confirm-btn').onclick = confirmPlanRecipe;
  openModal();
  refreshPlanModalWeek();
}

function shiftPlanWeek(delta) {
  _planWeekOffset += delta;
  refreshPlanModalWeek();
}

function refreshPlanModalWeek() {
  const ws = getWeekStart(_planWeekOffset);
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const weekKey = ws.toISOString().slice(0,10);
  const today = new Date(); today.setHours(0,0,0,0);
  const sel = document.getElementById('plan-day');
  const prev = sel.value;
  sel.innerHTML = DAYS_K.map((dk, i) => {
    const dt = new Date(ws); dt.setDate(dt.getDate() + i);
    const isToday = dt.toDateString() === today.toDateString();
    const selected = prev ? prev === dk : isToday;
    return `<option value="${dk}" ${selected?'selected':''}>${DAYS[i]} ${fmtDate(dt)}</option>`;
  }).join('');
  document.getElementById('plan-week-label').textContent = `${fmtDate(ws)} — ${fmtDate(we)}`;
  document.getElementById('plan-confirm-btn').dataset.weekkey = weekKey;
}

function confirmPlanRecipe() {
  const day = document.getElementById('plan-day').value;
  const meal = document.getElementById('plan-meal').value;
  const weekKey = document.getElementById('plan-confirm-btn').dataset.weekkey;
  const plan = getOrCreatePlan(weekKey);
  if (!plan.days[day]) plan.days[day] = {};
  plan.days[day][meal] = _planRecipeId;
  save(); closeModal();
  const r = recipeById(_planRecipeId);
  const dayLabel = DAYS[DAYS_K.indexOf(day)];
  const mealLabel = MEALS.find(m=>m.k===meal)?.label || meal;
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:10px 20px;border-radius:20px;font-size:.88rem;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3)';
  t.textContent = `✅ ${r?.name} → ${dayLabel} ${mealLabel}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

function clearHistory() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  state.shoppingHistory = [];
  save();
  renderMain();
}

function addToHistory(item, action, type) {
  if (!state.shoppingHistory) state.shoppingHistory = [];
  state.shoppingHistory.unshift({ts: Date.now(), item, action, type});
  if (state.shoppingHistory.length > 300) state.shoppingHistory = state.shoppingHistory.slice(0, 300);
}

function renderHistorySection() {
  const hist = state.shoppingHistory || [];
  if (!hist.length) return '';
  const fmtDate = ts => {
    const d = new Date(ts), now = new Date();
    const isToday = d.toDateString()===now.toDateString();
    const isYest  = d.toDateString()===new Date(now-86400000).toDateString();
    const day = isToday?'Aujourd\'hui':isYest?'Hier':d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    return `${day} ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
  };
  const typeLabel = t => t==='maison'?'🏠':t==='ingredient'?'🥕':'🍽️';
  return `
  <div style="margin-top:24px">
    <details open>
      <summary style="cursor:pointer;font-weight:700;color:var(--text-muted);font-size:.95rem;padding:10px 0;list-style:none;display:flex;align-items:center;justify-content:space-between">
        <span>📋 Historique des courses (${hist.length})</span><span style="font-size:.8rem">▼</span>
      </summary>
      <div class="card" style="margin-top:8px;padding:12px;max-height:320px;overflow-y:auto">
        ${hist.slice(0,150).map(h=>`
        <div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--green-light);font-size:.82rem">
          <span style="color:var(--text-muted);white-space:nowrap;min-width:130px">${fmtDate(h.ts)}</span>
          <span>${typeLabel(h.type)}</span>
          <span style="flex:1"><b>${escHtml(h.item)}</b> <span style="color:var(--text-muted)">${h.action==='bought'?'✅ acheté':'🛒 ajouté aux courses'}</span></span>
        </div>`).join('')}
      </div>
      <button class="btn btn-sm" style="margin-top:8px;color:#B91C1C;border:1.5px solid #FECACA;background:#fff" onclick="clearHistory()">🗑️ Effacer l'historique</button>
    </details>
  </div>`;
}

let _ingTab = 'pantry';
function setIngTab(t) { _ingTab = t; renderMain(); }

function filterIngredients(q) {
  const v = q.toLowerCase().trim();
  document.querySelectorAll('#ing-items-list .ing-cat-group').forEach(group => {
    let any = false;
    group.querySelectorAll('.ing-item').forEach(el => {
      const show = el.dataset.name.includes(v);
      el.style.display = show ? '' : 'none';
      if (show) any = true;
    });
    group.style.display = any ? '' : 'none';
  });
}

function renderIngredients() {
  const mi = state.masterIngredients || [];
  const pantry = [...mi.filter(i=>i.type==='pantry')].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  const shopping = [...mi.filter(i=>i.type==='shopping')].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  const pantryToBuy = pantry.filter(i=>i.needToBuy).length;
  const ingToBuy = shopping.filter(i=>i.needToBuy).length;
  const isPantry = _ingTab === 'pantry';
  const items = isPantry ? pantry : shopping;
  const accent = isPantry ? 'var(--amber)' : 'var(--green)';
  const accentLight = isPantry ? 'var(--amber-light)' : 'var(--green-light)';

  // Grouper par rayon
  const grouped = {};
  ingCats().forEach(c => { grouped[c.k] = []; });
  items.forEach(item => { (grouped[item.cat||'autre'] || grouped['autre']).push(item); });

  const renderItem = item => {
    const marked = item.needToBuy;
    return `<div class="ing-item" data-name="${escHtml(item.name.toLowerCase())}" style="${marked?`border-color:${accent};background:${accentLight};`:''}">

  return `

    <h2 style="font-size:1.1rem;color:var(--green-dark)">🥕 Ingrédients & Placard</h2>

    </div>
  </div>

  <div class="seg-tabs">
    <button class="seg-tab ${isPantry?'active':''}" onclick="setIngTab('pantry')">
      🫙 Placard <span style="font-weight:400;font-size:.78rem"> (${pantry.length})</span>

    </button>

  <input type="search" class="search-box" placeholder="🔍 Rechercher…" oninput="filterIngredients(this.value)" style="width:100%;margin-bottom:14px" autocomplete="off" autocorrect="off">

  ${items.length === 0 ? `<div class="empty-state"><p>Aucun ingrédient ici.<br>Cliquez sur <b>+ Ajouter</b> pour commencer.</p></div>` : ''}
  <div id="ing-items-list">${groupsHTML}</div>`;

  item.needToBuy = val;
  if (val) addToHistory(item.name, 'added', item.type==='pantry'?'placard':'ingredient');
  save(); renderMain();
}

function buyMasterIngredient(id) {
  const item = (state.masterIngredients||[]).find(i=>i.id===id);
  if (!item) return;
  addToHistory(item.name, 'bought', item.type==='pantry'?'placard':'ingredient');

}

function buyPantryItem(id) { buyMasterIngredient(id); }
function buyIngredientItem(id) { buyMasterIngredient(id); }

function deleteMasterIngredient(id) {

function openAddMasterIngredient(defaultType, defaultCat) {

    <h2>Ajouter un ingrédient</h2>

    <div class="form-group"><label>Nom de l'ingrédient</label>

    </div>
    <div class="form-group"><label>Rayon</label>
      <select id="new-mi-cat">
        ${ingCats().map(c=>`<option value="${c.k}" ${(defaultCat||'autre')===c.k?'selected':''}>${c.l}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Type</label>
      <select id="new-mi-type">
        <option value="pantry" ${defaultType==='pantry'?'selected':''}>🫙 Placard (toujours en stock)</option>
        <option value="shopping" ${defaultType==='shopping'?'selected':''}>🛒 Ponctuel (à acheter)</option>
      </select>
    </div>
    <div id="mi-warn" style="display:none;background:var(--amber-light);border-radius:6px;padding:8px 12px;font-size:.83rem;color:#7a5000;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveMasterIngredient()">Ajouter</button>
    </div>`;
  openModal();
  const inp = document.getElementById('new-mi-name');
  setTimeout(()=>inp?.focus(),100);
  inp.addEventListener('input', function() {
    const val = this.value.trim().toLowerCase();
    const found = (state.masterIngredients||[]).find(i=>i.name.toLowerCase()===val);
    const warn = document.getElementById('mi-warn');
    if (found) {
      warn.style.display='block';
      const catLabel = ingCats().find(c=>c.k===found.cat)?.l || found.cat;
      warn.textContent = `"${found.name}" existe déjà (${found.type==='pantry'?'Placard':'Ponctuel'} · ${catLabel}). Enregistrer mettra à jour rayon et type.`;
      document.getElementById('new-mi-cat').value = found.cat || 'autre';
      document.getElementById('new-mi-type').value = found.type;
    } else { warn.style.display='none'; }
  });
}

function saveMasterIngredient() {
  const name = document.getElementById('new-mi-name').value.trim();
  if (!name) { alert('Le nom est requis.'); return; }
  const type = document.getElementById('new-mi-type').value;
  const cat  = document.getElementById('new-mi-cat').value;
  if (!state.masterIngredients) state.masterIngredients = [];
  const existing = state.masterIngredients.find(i=>i.name.toLowerCase()===name.toLowerCase());
  if (existing) {
    existing.type = type;
    existing.cat  = cat;
  } else {
    state.masterIngredients.push({id:uid(), name, type, cat, needToBuy: type==='shopping'});
  }
  save(); closeModal(); renderMain();
}

function openManageRayons() {
  const renderRayonList = () => {
    const cats = ingCats();
    return cats.map(c => {
      const count = (state.masterIngredients||[]).filter(i=>i.cat===c.k).length;
      const isProtected = c.k === 'autre';
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input type="text" value="${escHtml(c.l)}" onblur="renameRayon('${c.k}',this.value)" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:.9rem">
        <span style="font-size:.75rem;color:var(--text-muted);white-space:nowrap">${count} art.</span>
        <button class="del-btn" ${isProtected?'disabled style="opacity:.35" title="Ce rayon est requis"':'onclick="deleteRayon(\''+c.k+'\')" title="Supprimer"'}>🗑</button>
      </div>`;
    }).join('');
  };
  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>⚙️ Gérer les rayons</h2>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:14px">Cliquez sur le nom pour le modifier. Les articles d'un rayon supprimé rejoignent "📦 Autre".</p>
    <div id="rayon-list">${renderRayonList()}</div>
    <div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <input type="text" id="new-rayon-name" placeholder="Ex: 🥐 Boulangerie…" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem">
      <button class="btn btn-primary" onclick="addRayon()">+ Ajouter</button>
    </div>`;
  openModal();
  setTimeout(()=>document.getElementById('new-rayon-name')?.focus(), 100);
}

function renameRayon(k, newLabel) {
  const label = newLabel.trim();
  if (!label) return;
  const cat = ingCats().find(c=>c.k===k);
  if (cat) { cat.l = label; save(); }
}

function addRayon() {
  const name = document.getElementById('new-rayon-name').value.trim();
  if (!name) return;
  if (!state.ingredientCats) state.ingredientCats = JSON.parse(JSON.stringify(INITIAL_INGREDIENT_CATS));
  // Insérer avant "autre" (toujours en dernier)
  const autreIdx = state.ingredientCats.findIndex(c=>c.k==='autre');
  const entry = {k: uid(), l: name};
  if (autreIdx >= 0) state.ingredientCats.splice(autreIdx, 0, entry);
  else state.ingredientCats.push(entry);
  save();
  openManageRayons();
}

function deleteRayon(k) {
  if (k === 'autre') return;
  const count = (state.masterIngredients||[]).filter(i=>i.cat===k).length;
  const label = ingCats().find(c=>c.k===k)?.l || k;
  const msg = count > 0
    ? `"${label}" contient ${count} ingrédient(s) qui seront déplacés vers "📦 Autre". Confirmer ?`
    : `Supprimer le rayon "${label}" ?`;
  if (!confirm(msg)) return;
  (state.masterIngredients||[]).filter(i=>i.cat===k).forEach(i=>i.cat='autre');
  state.ingredientCats = ingCats().filter(c=>c.k!==k);
  save();
  openManageRayons();
}

// ═══════════════════════════════════════════════════════
// LISTE DE COURSES
// ═══════════════════════════════════════════════════════
function renderShopping() {
  const ws = getWeekStart(weekOffset);
  const weekKey = ws.toISOString().slice(0,10);
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const plan = state.weeklyPlans.find(p=>p.weekStart===weekKey);
  const recipeIds = new Set();
  if (plan) Object.values(plan.days).forEach(day => Object.values(day).forEach(id=>recipeIds.add(id)));

  const checkedKey = `checked-${weekKey}`;
  if (!state.checkedItems) state.checkedItems = {};
  if (!state.checkedItems[checkedKey]) state.checkedItems[checkedKey] = {};
  const checked = state.checkedItems[checkedKey];
  if (!state.dismissedItems) state.dismissedItems = {};
  if (!state.dismissedItems[checkedKey]) state.dismissedItems[checkedKey] = {};
  const dismissed = state.dismissedItems[checkedKey];

  // ── Construction de la liste unifiée ──────────────────
  // normKey → {name, cat, type:'recipe'|'pantry'|'shopping', masterId, entries[]}
  const allMap = {};

  // 1. Ingrédients des recettes planifiées
  recipeIds.forEach(id => {
    const r = recipeById(id); if (!r) return;
    r.ingredients.forEach(ing => {
      const norm = normIngName(ing.n);
      const master = (state.masterIngredients||[]).find(p => normIngName(p.name)===norm);
      if (master?.type==='pantry' && !master.needToBuy) return;
      if (!allMap[norm]) allMap[norm] = {name:ing.n, cat:master?.cat||'autre', type:'recipe', masterId:master?.id, entries:[]};
      allMap[norm].entries.push({q:ing.q, u:ing.u});
    });
  });

  // 2. Placard à racheter (fusion si déjà dans les recettes)
  (state.masterIngredients||[]).filter(i=>i.type==='pantry'&&i.needToBuy).forEach(item => {
    const norm = normIngName(item.name);
    if (allMap[norm]) { allMap[norm].masterId = item.id; }
    else allMap[norm] = {name:item.name, cat:item.cat||'autre', type:'pantry', masterId:item.id, entries:[]};
  });

  // 3. Ingrédients ponctuels cochés
  (state.masterIngredients||[]).filter(i=>i.type==='shopping'&&i.needToBuy).forEach(item => {
    const norm = normIngName(item.name);
    if (!allMap[norm]) allMap[norm] = {name:item.name, cat:item.cat||'autre', type:'shopping', masterId:item.id, entries:[]};
  });

  // Filtrer les éléments masqués
  const allItems = Object.values(allMap).filter(it => !dismissed[it.name.toLowerCase().trim()]);

  // ── Groupement par rayon ──────────────────────────────
  const byRayon = {};
  ingCats().forEach(c => byRayon[c.k] = []);
  allItems.forEach(it => (byRayon[it.cat]||byRayon['autre']).push(it));
  ingCats().forEach(c => byRayon[c.k].sort((a,b)=>a.name.localeCompare(b.name,'fr')));

  const maisonToBuy = (state.maisonItems||[]).filter(i=>i.needToBuy);
  const totalItems = allItems.length;
  const doneCount = allItems.filter(it => it.type==='recipe' && !!checked[it.name.toLowerCase().trim()]).length;

  const weekNav = `<div class="week-nav">
    <button onclick="weekOffset--;render()">◀</button>
    <span class="week-label">${fmtDate(ws)} — ${fmtDate(we)}</span>
    <button onclick="weekOffset++;render()">▶</button>
    <button class="btn btn-outline btn-sm" onclick="weekOffset=0;render()">Aujourd'hui</button>
  </div>`;

  // ── Rendu d'un article ─────────────────────────────────
  const renderShopItem = it => {
    const key = it.name.toLowerCase().trim();
    if (it.type === 'recipe') {
      const isChecked = !!checked[key];
      const summary = it.entries.length ? sumQty(it.entries) : '';
      return `<div class="shop-item${isChecked?' checked':''}">
        <input type="checkbox" ${isChecked?'checked':''} onchange="toggleCheck('${checkedKey}','${key}',this.checked)">
        <label onclick="toggleCheckLabel('${checkedKey}','${key}')"><b>${escHtml(it.name)}</b>${summary?` <span style="color:var(--text-muted);font-size:.82rem">${escHtml(summary)}</span>`:''}
        </label>
        <button class="del-btn" onclick="dismissShoppingItem('${checkedKey}','${key}')" title="Retirer sans historique">🗑</button>
      </div>`;
    }
    const isPantry = it.type==='pantry';
    return `<div class="shop-item">
      <input type="checkbox" onchange="buyMasterIngredient('${it.masterId}')" style="accent-color:${isPantry?'var(--amber)':'var(--green)'};width:16px;height:16px;cursor:pointer">
      <label style="flex:1;cursor:pointer" onclick="buyMasterIngredient('${it.masterId}')">${escHtml(it.name)} <span style="font-size:.7rem;color:var(--text-muted)">${isPantry?'🫙 placard':'🛒'}</span></label>
      <button class="del-btn" onclick="toggleMasterIngredient('${it.masterId}',false)" title="Retirer de la liste">🗑</button>
    </div>`;
  };

  // ── Section Maison ─────────────────────────────────────
  const maisonSection = maisonToBuy.length>0 ? `
    <div class="card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:.83rem;color:var(--green-dark);padding:6px 0 5px;border-bottom:2px solid var(--amber-light);margin-bottom:4px">🏠 Produits maison</div>
      ${maisonToBuy.map(item=>`
      <div class="shop-item">
        <input type="checkbox" onchange="buyMaisonItem('${item.id}')" style="accent-color:var(--amber);width:16px;height:16px;cursor:pointer">
        <label style="flex:1;cursor:pointer" onclick="buyMaisonItem('${item.id}')">${escHtml(item.name)}</label>
        <button class="del-btn" onclick="toggleMaisonItem('${item.id}',false)">🗑</button>
      </div>`).join('')}
    </div>` : '';

  // ── Rayons alimentaires ────────────────────────────────
  const rayonHTML = ingCats().map(cat => {
    const catItems = byRayon[cat.k];
    if (!catItems.length) return '';
    return `<div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:.83rem;color:var(--green-dark);padding:5px 0;border-bottom:2px solid var(--green-light);margin-bottom:4px">${cat.l}</div>
      ${catItems.map(renderShopItem).join('')}
    </div>`;
  }).join('');

  if (totalItems===0) return `
    <div class="section-header"><h2>🛒 Liste de courses</h2></div>
    ${weekNav}
    ${maisonSection}
    ${!maisonToBuy.length?`<div class="empty-state"><div class="icon">🛒</div><p>Aucune recette planifiée et aucun article ajouté.</p><p style="margin-top:8px">Planifiez des repas ou cochez des articles dans <b>Ingrédients</b> et <b>Maison</b>.</p></div>`:''}
    ${renderHistorySection()}`;

  return `
  <div class="section-header">
    <h2>🛒 Courses — <span style="font-size:.85rem;font-weight:400;color:var(--text-muted)">${fmtDate(ws)} → ${fmtDate(we)}</span></h2>
    <button class="btn btn-outline btn-sm" onclick="uncheckAll('${checkedKey}')">☐ Tout décocher</button>
  </div>
  ${weekNav}
  ${maisonSection}
  <div class="card" style="margin-bottom:12px;padding:10px 16px;background:var(--green-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
    <span style="font-size:.88rem"><b>${recipeIds.size}</b> recette${recipeIds.size>1?'s':''} · <b>${totalItems}</b> articles · <b>${doneCount}</b> cochés</span>
    <span style="font-size:.78rem;color:var(--text-muted)">${[...recipeIds].map(id=>recipeById(id)?.name).filter(Boolean).join(' · ')}</span>
  </div>
  <div class="card" style="padding:12px 16px">
    ${rayonHTML}
  </div>
  ${renderHistorySection()}`;
}
function toggleCheck(checkedKey, key, val) {
  if (!state.checkedItems[checkedKey]) state.checkedItems[checkedKey]={};
  if (val) { state.checkedItems[checkedKey][key]=true; addToHistory(key, 'bought', 'recette'); }
  else delete state.checkedItems[checkedKey][key];
  save();
  const item = document.querySelector(`.shop-item input[onchange*="${key}"]`)?.closest('.shop-item');
  if (item) item.className = 'shop-item' + (val?' checked':'');
}
function toggleCheckLabel(checkedKey, key) {
  if (!state.checkedItems[checkedKey]) state.checkedItems[checkedKey]={};
  const v = !state.checkedItems[checkedKey][key];
  if (v) state.checkedItems[checkedKey][key]=true;
  else delete state.checkedItems[checkedKey][key];
  save(); renderMain();
}
function uncheckAll(checkedKey) { state.checkedItems[checkedKey]={}; save(); renderMain(); }
function dismissShoppingItem(checkedKey, key) {
  if (!state.dismissedItems) state.dismissedItems = {};
  if (!state.dismissedItems[checkedKey]) state.dismissedItems[checkedKey] = {};
  state.dismissedItems[checkedKey][key] = true;
  save(); renderMain();
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay'))closeModal(); });
document.getElementById('picker-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('picker-overlay'))closePicker(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();closePicker();} });

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadFromStorage(); // Affichage immédiat depuis le cache local
render();
initFirestore();  // Puis synchronisation avec Firebase
</script>
